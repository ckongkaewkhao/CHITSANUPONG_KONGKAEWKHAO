<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chitsanupong Kongkaewkhao | Landscape Architecture Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://api.fontshare.com/v2/css?f[]=synonym@200,300,400,500,600,700&display=swap');
        
        body {
            font-family: 'Synonym', sans-serif;
            background-color: #FFFFFF; 
            color: #1A1A1A;
            scroll-behavior: smooth;
        }

        /* Standard vertical scrollbar for the whole page */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #FFFFFF; 
        }
        ::-webkit-scrollbar-thumb {
            background: #E5E5E5;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #CCCCCC;
        }

        /* 🌟 คลาสพิเศษสำหรับซ่อน Scrollbar แนวนอนในหน้า Project Detail 🌟 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased selection:bg-neutral-200">

    <div class="min-h-screen flex flex-col md:flex-row">
        
        <!-- Sidebar -->
        <aside class="w-full md:w-[340px] md:fixed md:top-0 md:left-0 md:h-screen p-8 md:p-12 flex flex-col justify-between bg-white z-50">
            <div class="space-y-12">
                <div>
                    <button onclick="navigateTo('home')" class="text-left group focus:outline-none">
                        <h1 class="text-lg md:text-xl font-bold tracking-tight uppercase text-orange-500 group-hover:text-orange-400 transition-colors duration-200">
                            Chitsanupong Kongkaewkhao
                        </h1>
                        <p class="text-sm text-neutral-400 mt-2 uppercase tracking-widest">Landscape Architecture Student</p>
                    </button>
                </div>

                <nav class="flex flex-col space-y-4 text-base">
                    <button onclick="navigateTo('about')" id="nav-about" class="text-left text-neutral-400 hover:text-neutral-900 transition-colors duration-200 uppercase tracking-wider font-medium focus:outline-none">
                        About
                    </button>
                    <button onclick="navigateTo('projects')" id="nav-projects" class="text-left text-neutral-400 hover:text-neutral-900 transition-colors duration-200 uppercase tracking-wider font-medium focus:outline-none">
                        Projects
                    </button>
                    <button onclick="navigateTo('contact')" id="nav-contact" class="text-left text-neutral-400 hover:text-neutral-900 transition-colors duration-200 uppercase tracking-wider font-medium focus:outline-none">
                        Contact
                    </button>
                </nav>
            </div>

            <div class="hidden md:block text-xs text-neutral-400 uppercase tracking-widest">
                &copy; 2026 Chitsanupong K.
            </div>
        </aside>

        <!-- Main Content -->
        <main class="w-full md:ml-[340px] p-8 md:p-12 flex-1 relative max-w-full overflow-hidden">
            
            <section id="view-home" class="view-section fade-in flex items-center justify-center min-h-[70vh] md:min-h-[80vh]">
                <div class="max-w-6xl w-full flex flex-col md:flex-row items-center md:items-end justify-center gap-10 md:gap-16 py-12">
                    <div class="w-full max-w-sm md:w-2/5 bg-neutral-50 rounded overflow-hidden relative group cursor-pointer border border-neutral-100 shrink-0 flex items-center justify-center" onclick="navigateTo('projects')">
                        <img src="images/featured-hero.jpg" alt="Featured Architectural Rendering" class="w-full h-auto object-contain block relative z-10 transition-transform duration-700 scale-100 group-hover:scale-[1.02]" onerror="this.style.display='none';">
                    </div>
                    <div class="w-full md:w-3/5 flex flex-col text-center md:text-right md:pb-4">
                        <h2 class="text-2xl md:text-4xl lg:text-5xl font-light tracking-tight text-neutral-800 leading-relaxed md:leading-tight">
                            <span class="font-semibold text-neutral-950">Design</span> is not just what it looks like and feels like.<br class="hidden xl:block"> 
                            <span class="font-semibold text-neutral-950">Design</span> is how it works.
                        </h2>
                    </div>
                </div>
            </section>

            <section id="view-about" class="view-section hidden">
                <div class="max-w-5xl pt-4 md:pt-12 fade-in">
                    <h2 class="text-sm uppercase tracking-widest text-neutral-400 mb-8 md:mb-12">Profile</h2>
                    <!-- ใส่เนื้อหา About ตามเดิม -->
                </div>
            </section>

            <!-- 🌟 หน้า Projects รวม: ใช้ Grid เลื่อนลงแนวตั้งแบบปกติ 🌟 -->
            <section id="view-projects" class="view-section hidden">
                <div class="max-w-6xl pt-4 md:pt-12 fade-in pb-20">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-16">
                        
                        <div onclick="openProject('nongbon')" class="group cursor-pointer flex flex-col gap-4">
                            <div class="w-full aspect-[4/3] bg-neutral-50 rounded-sm overflow-hidden relative border border-neutral-100">
                                <img src="images/nongbon-thumb.jpg" alt="Nongbon Lake Thumbnail" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 z-10" onerror="this.style.display='none';">
                            </div>
                            <div>
                                <h3 class="text-base font-medium text-neutral-900 group-hover:text-neutral-500 transition-colors duration-200">TARASUPHAWAT (NONGBON LAKE)</h3>
                                <p class="text-[11px] text-neutral-400 uppercase tracking-widest mt-1">Bangkok, Thailand</p>
                            </div>
                        </div>

                        <!-- เพิ่ม Project อื่นๆ ลงมาตรงนี้ได้เลย (จะเลื่อนลงแนวตั้งอัตโนมัติ) -->

                    </div>
                </div>
            </section>

            <!-- 🌟 หน้าแสดงรายละเอียดโปรเจกต์: เลื่อนแนวนอน และซ่อน Scrollbar 🌟 -->
            <section id="view-project-detail" class="view-section hidden w-full h-full flex flex-col fade-in">
                
                <!-- ปุ่มย้อนกลับ Fix ไว้ด้านซ้ายบน -->
                <div class="pt-4 md:pt-8 mb-8 z-10 w-fit">
                    <button onclick="navigateTo('projects')" class="inline-flex items-center text-xs uppercase tracking-widest text-neutral-400 hover:text-neutral-900 transition-colors duration-200 focus:outline-none">
                        &larr; BACK TO SELECTED WORKS
                    </button>
                </div>

                <!-- 🌟 กล่องเลื่อนแนวนอน (Horizontal Container แบบไม่มี Scrollbar) 🌟 -->
                <!-- กำหนดความสูง (เช่น h-[70vh]) เพื่อให้รูปขยายเต็มความสูงนี้ และเลื่อนซ้ายขวาได้ -->
                <div id="project-horizontal-container" class="flex flex-row overflow-x-auto overflow-y-hidden no-scrollbar gap-12 md:gap-20 items-start w-full h-[65vh] md:h-[75vh] pb-4">
                    <!-- Javascript จะนำบล็อกข้อมูล รูป และข้อความ มาต่อกันในนี้ -->
                </div>

            </section>

            <section id="view-contact" class="view-section hidden">
                <!-- เนื้อหา Contact ตามเดิม -->
            </section>

        </main>
    </div>

    <!-- Lightbox Modal สำหรับขยายรูป -->
    <div id="lightbox-modal" onclick="closeLightbox()" class="fixed inset-0 bg-neutral-950/90 z-[100] hidden flex items-center justify-center p-4 md:p-12 cursor-zoom-out transition-opacity duration-300 opacity-0">
        <img id="lightbox-img" src="" alt="Enlarged" class="max-w-full max-h-[85vh] object-contain rounded shadow-2xl" onclick="event.stopPropagation();">
        <p id="lightbox-caption" class="absolute bottom-6 left-0 right-0 text-xs tracking-wider uppercase text-neutral-400 text-center font-light"></p>
    </div>

    <script>
        // 🌟 โครงสร้าง Data ใหม่: สามารถแทรกข้อความ สลับกับรูปภาพ ได้ตามต้องการ (ด้วย Array 'blocks') 🌟
        const projectData = {
            nongbon: {
                title: "TARASUPHAWAT (NONGBON LAKE)",
                blocks: [
                    // Block 1: ส่วนหัวของ Project (ข้อความหลัก)
                    {
                        type: "info",
                        location: "Bangkok, Thailand",
                        typology: "Public Park & Water Management",
                        size: "644 RAI",
                        status: "Academic Project Y3",
                        desc: "Nongbon Lake Sports Center Park stands as one of Bangkok's key \"green lungs.\" Nestled in Soi Chaloem Phra Kiat R.9 Soi 43, Prawet District, this park is the ultimate hub for nature and outdoor fitness. Covering an expansive 644 rai, its vast landscape supports a diverse range of activities, with a special emphasis on water sports and outdoor recreation."
                    },
                    // Block 2: รูปภาพ
                    {
                        type: "image",
                        url: "images/nongbon-1.jpg",
                        caption: "01 / PARK PERSPECTIVE VIEW"
                    },
                    // Block 3: รูปภาพ
                    {
                        type: "image",
                        url: "images/nongbon-2.jpg",
                        caption: "02 / WATER CIRCULATION MASTER PLAN"
                    },
                    // Block 4: แทรกข้อความอธิบายระหว่างรูป!
                    {
                        type: "text",
                        content: "The water circulation system is designed to naturally filter run-off from the surrounding urban environment before it enters the main reservoir. We used a series of retention ponds and wetland filtration edges to ensure water quality remains high for recreational water sports."
                    },
                    // Block 5: รูปภาพต่อ
                    {
                        type: "image",
                        url: "images/nongbon-3.jpg",
                        caption: "03 / SECTION AND FILTRATION DIAGRAM"
                    }
                ]
            }
            // สามารถเพิ่มโปรเจกต์อื่นๆ ต่อได้โดยใช้โครงสร้าง blocks แบบเดียวกัน
        };

        function navigateTo(viewId) {
            document.querySelectorAll('.view-section').forEach(section => {
                section.classList.add('hidden');
            });
            
            const activeSection = document.getElementById(`view-${viewId}`);
            if(activeSection) {
                activeSection.classList.remove('hidden');
                // เลื่อนหน้าจอหลักกลับไปบนสุด
                window.scrollTo({ top: 0, left: 0, behavior: 'smooth' }); 
            }

            const menuButtons = ['about', 'projects', 'contact'];
            menuButtons.forEach(btn => {
                const el = document.getElementById(`nav-${btn}`);
                if(el) {
                    if(btn === viewId) {
                        el.classList.remove('text-neutral-400');
                        el.classList.add('text-neutral-900', 'font-semibold');
                    } else {
                        el.classList.remove('text-neutral-900', 'font-semibold');
                        el.classList.add('text-neutral-400');
                    }
                }
            });
        }

        // ฟังก์ชันสร้างหน้า Project Detail แนวนอน
        function openProject(projectId) {
            const data = projectData[projectId];
            if(!data) return;

            const container = document.getElementById('project-horizontal-container');
            container.innerHTML = ''; // ล้างของเก่าออก
            
            if(data.blocks) {
                data.blocks.forEach(block => {
                    
                    // เงื่อนไข: ถ้าเป็นบล็อกข้อมูลหลัก (ซ้ายสุด)
                    if (block.type === 'info') {
                        container.innerHTML += `
                            <div class="w-72 md:w-80 shrink-0 space-y-10 whitespace-normal">
                                <div>
                                    <h2 class="text-2xl md:text-3xl font-medium tracking-tight text-neutral-900 leading-tight">${data.title}</h2>
                                    <p class="text-xs text-neutral-400 uppercase tracking-widest mt-2">${block.location}</p>
                                </div>
                                <div class="border-t border-neutral-100 pt-6 space-y-4 text-[11px] uppercase tracking-wider">
                                    <div class="flex justify-between"><span class="text-neutral-400">Typology</span><span class="text-neutral-900">${block.typology}</span></div>
                                    <div class="flex justify-between"><span class="text-neutral-400">Scale</span><span class="text-neutral-900">${block.size}</span></div>
                                    <div class="flex justify-between"><span class="text-neutral-400">Status</span><span class="text-neutral-900">${block.status}</span></div>
                                </div>
                                <p class="text-sm font-light text-neutral-600 leading-relaxed">${block.desc}</p>
                            </div>
                        `;
                    } 
                    
                    // เงื่อนไข: ถ้าเป็นบล็อกข้อความอธิบาย (แทรกระหว่างรูป)
                    else if (block.type === 'text') {
                        container.innerHTML += `
                            <div class="w-64 md:w-72 shrink-0 whitespace-normal pt-12">
                                <p class="text-sm font-light text-neutral-600 leading-relaxed border-l border-neutral-200 pl-6">
                                    ${block.content}
                                </p>
                            </div>
                        `;
                    } 
                    
                    // เงื่อนไข: ถ้าเป็นบล็อกรูปภาพ
                    else if (block.type === 'image') {
                        container.innerHTML += `
                            <div class="h-[85%] md:h-[95%] shrink-0 flex flex-col justify-start group cursor-zoom-in" onclick="openLightbox('${block.url}', '${block.caption}')">
                                <div class="h-full relative border border-neutral-100 bg-neutral-50 overflow-hidden">
                                    <img src="${block.url}" alt="${block.caption}" class="h-full w-auto object-cover max-w-[85vw] transition-opacity duration-300 group-hover:opacity-80" onerror="this.style.display='none';">
                                </div>
                                <p class="text-[10px] uppercase tracking-widest text-neutral-400 mt-3 font-light pl-1">${block.caption}</p>
                            </div>
                        `;
                    }
                });
                
                // เพิ่มพื้นที่ว่างท้ายสุด เพื่อให้รูปสุดท้ายไม่ชิดขอบจอเกินไปเวลาเลื่อนสุด
                container.innerHTML += `<div class="w-12 shrink-0"></div>`;
            }

            // เลื่อนแถบแนวนอนกลับไปจุดเริ่มต้น (ซ้ายสุด) ทุกครั้งที่เปิดโปรเจกต์ใหม่
            container.scrollLeft = 0;
            navigateTo('project-detail');
        }

        function openLightbox(imgSrc, captionText) {
            const modal = document.getElementById('lightbox-modal');
            const img = document.getElementById('lightbox-img');
            const caption = document.getElementById('lightbox-caption');
            
            img.src = imgSrc;
            caption.innerText = captionText;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
            }, 10);
        }

        function closeLightbox() {
            const modal = document.getElementById('lightbox-modal');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        }
    </script>
</body>
</html>
